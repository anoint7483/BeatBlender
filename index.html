<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatBlender</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="container">
        <div class="navBar">
            <div class="mainHead">
                <li class="brand"> <img src="assets/icons/BeatBlender_icon.jpg" alt="Spotify">BeatBlender</li>
            </div>
            <div class="navIcon">
                <li><img src="assets/icons/noun-menu-1570746.svg" alt=""></li>
            </div>
        </div>
        <div class="main">
        </div>
        <div class="bottom">
            <input type="range" name="range" id="myProgressBar" min="0" value=0 max="100">
            <div class="icons">
                <li><img src="assets/icons/noun-previous-button-2673039.svg" alt=""></li>
                <li class="plays"><img src="assets/icons/noun-play-5662473.svg" alt=""></li>
                <li><img src="assets/icons/noun-next-button-2673036.svg" alt=""></li>
            </div>
            <!-- <li class="pause"><img src="assets/icons/noun-pause-button-6451365.svg" alt=""></li> -->
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
